name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest --cov --cov-report=term-missing

  secrets:
    # raw gitleaks binary — gitleaks-action@v2 requires a paid license on org repos.
    # Runs on a CodeBuild-managed ephemeral GitHub Actions runner (project
    # telos-runner, arm64/Graviton; cost-I2864 — replaces the self-hosted EC2-spot
    # runner + telos-runner-dispatcher Lambda). Pure curl+tar+gitleaks, no
    # Python/Node dependency, so it stays off the hosted runners (telos#44).
    runs-on: codebuild-telos-runner-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run gitleaks over full history
        run: |
          # arch-aware: CodeBuild runner is arm64/Graviton; keep x64 fallback so a
          # future compute change can't silently pull the wrong binary (cost-I2864).
          arch="$(uname -m)"; case "$arch" in aarch64|arm64) gl=arm64;; *) gl=x64;; esac
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_${gl}.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --no-banner --redact

  web:
    name: tsc + lint + build (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npx next lint
      - name: Build
        run: npm run build
