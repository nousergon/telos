  salt:
    # TY2024 predates OBBBA §70120: IRC §164(b)(6) imposed a FLAT $10,000
    # ($5,000 MFS) cap with NO MAGI phase-down. The 2025 pack's phase-down
    # keys (magi_phase_down_threshold, phase_down_rate, floor) do not exist
    # for 2024 — the cap IS the flat limit. On a profile with >$10,000 of
    # state+local tax the cap binds directly, exercising the pre-OBBBA
    # §164(b)(6) branch that the 2025 $40,000 cap seldom touches.
    cap:
      value: 10000
      source: "IRC §164(b)(6)(B) (TY2018-2025 flat $10,000 aggregate SALT limitation, pre-OBBBA); 2024 Instructions for Schedule A (Form 1040), line 5e: 'the total ... is limited to $10,000 ($5,000 if married filing separately)'"
    cap_married_filing_separately:
      value: 5000
      source: "IRC §164(b)(6)(B) (half the limitation for MFS); 2024 Instructions for Schedule A (Form 1040), line 5e: '$5,000 if married filing separately'"
