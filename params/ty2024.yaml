# TY2024 federal parameter pack.
#
# Every value transcribed from the cited primary document on 2026-07-03 —
# never from memory. Sources: Rev. Proc. 2023-34 (2024 inflation adjustments,
# fetched from irs.gov/pub/irs-drop/rp-23-34.pdf) and the final 2024 Form
# 1040 instructions (fetched from irs.gov/pub/irs-prior/i1040gi--2024.pdf)
# where a form-level citation is more precise. TY2024 predates OBBBA (Pub. L.
# 119-21, enacted 2025-07-04), so the pre-OBBBA Code applies throughout: the
# standard deduction is Rev. Proc.'s $14,600 single (NOT the 2025 $15,750),
# the SALT cap is the flat $10,000 §164(b)(6) limit (which BINDS on any
# itemizer with >$10k of state+local tax — a branch the 2025 $40,000 cap
# rarely exercises), and the AMT exemption phases out at the statutory 25%
# rate (§55(d)(3)(A), pre-OBBBA-§70107).
#
# Status is `final`: the VALUES and the form-level structure are both from
# published final 2024 documents. The end-to-end replay gate (reproducing the
# filed TY2024 return to the dollar) is a SEPARATE, local-only verification
# (`pytest -m personal`, telos-ops#18) that needs Brian's filed-2024 fixture,
# which lives outside the repo and never enters CI; this pack's own
# transcription cross-check (test_ty2024_pack.py) runs in CI.
