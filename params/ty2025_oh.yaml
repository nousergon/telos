# TY2025 Ohio parameter pack. Every value transcribed 2026-07-02 from the
# official 2025 Ohio IT 1040/SD 100 instruction booklet (fetched from
# tax.ohio.gov / dam.assets.ohio.gov, printed version dated 2025-11-27).
# NOTE the printed bracket constants are NOT algebraically chained (the $342
# base creates a real discontinuity at $26,050) — they are implemented
# exactly as printed, never re-derived.
